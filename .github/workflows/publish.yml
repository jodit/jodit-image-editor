name: Jodit Image Editor

on:
  workflow_dispatch:

  push:
    tags: ['*']

permissions:
  id-token: write # Required for npm OIDC trusted publishing + provenance
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  publish:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Update npm to latest
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish

      # Rebuild & redeploy the xdsoft.net site so the /jodit/image-editor/
      # section (its docs are read straight from this package) picks up the
      # new release. The home CI listens for repository_dispatch type "opened".
      # PAT_USERNAME / PAT_TOKEN are repo secrets (a PAT with repo scope).
      - name: Trigger jodit-pro-home site rebuild
        run: |
          curl -XPOST \
            -u "${{ secrets.PAT_USERNAME }}:${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.everest-preview+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/xdan/jodit-pro-home/dispatches \
            --data '{"event_type": "opened"}'
